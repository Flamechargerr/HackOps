<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#020617"/>
  <text x="600" y="55" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="34" font-weight="700">HackOps MongoDB Schema Design</text>

  <rect x="100" y="120" width="300" height="260" rx="10" fill="#1e3a8a"/>
  <text x="250" y="160" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">users</text>
  <text x="120" y="200" fill="#dbeafe" font-family="Courier New" font-size="18">_id: ObjectId</text>
  <text x="120" y="230" fill="#dbeafe" font-family="Courier New" font-size="18">username: string (unique)</text>
  <text x="120" y="260" fill="#dbeafe" font-family="Courier New" font-size="18">email: string (unique)</text>
  <text x="120" y="290" fill="#dbeafe" font-family="Courier New" font-size="18">passwordHash: string</text>
  <text x="120" y="320" fill="#dbeafe" font-family="Courier New" font-size="18">progress.totalScore: number</text>
  <text x="120" y="350" fill="#dbeafe" font-family="Courier New" font-size="18">progress.badges: string[]</text>

  <rect x="460" y="120" width="300" height="260" rx="10" fill="#0f766e"/>
  <text x="610" y="160" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">challenges</text>
  <text x="480" y="200" fill="#ccfbf1" font-family="Courier New" font-size="18">_id: ObjectId</text>
  <text x="480" y="230" fill="#ccfbf1" font-family="Courier New" font-size="18">slug: string (unique)</text>
  <text x="480" y="260" fill="#ccfbf1" font-family="Courier New" font-size="18">category: enum</text>
  <text x="480" y="290" fill="#ccfbf1" font-family="Courier New" font-size="18">difficulty: enum</text>
  <text x="480" y="320" fill="#ccfbf1" font-family="Courier New" font-size="18">points: number</text>
  <text x="480" y="350" fill="#ccfbf1" font-family="Courier New" font-size="18">learningObjective: string</text>

  <rect x="820" y="120" width="300" height="260" rx="10" fill="#7c2d12"/>
  <text x="970" y="160" text-anchor="middle" fill="#fff" font-family="Arial" font-size="24" font-weight="700">challenge_attempts</text>
  <text x="840" y="200" fill="#ffedd5" font-family="Courier New" font-size="18">_id: ObjectId</text>
  <text x="840" y="230" fill="#ffedd5" font-family="Courier New" font-size="18">userId: ObjectId (ref users)</text>
  <text x="840" y="260" fill="#ffedd5" font-family="Courier New" font-size="18">challengeId: ObjectId (ref)</text>
  <text x="840" y="290" fill="#ffedd5" font-family="Courier New" font-size="18">isCompleted: boolean</text>
  <text x="840" y="320" fill="#ffedd5" font-family="Courier New" font-size="18">scoreAwarded: number</text>
  <text x="840" y="350" fill="#ffedd5" font-family="Courier New" font-size="18">attempts, hintsUsed</text>

  <line x1="400" y1="250" x2="460" y2="250" stroke="#93c5fd" stroke-width="4"/>
  <polygon points="460,250 445,242 445,258" fill="#93c5fd"/>
  <line x1="760" y1="250" x2="820" y2="250" stroke="#99f6e4" stroke-width="4"/>
  <polygon points="820,250 805,242 805,258" fill="#99f6e4"/>

  <text x="600" y="480" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="28" font-weight="700">Index Strategy</text>
  <text x="600" y="530" text-anchor="middle" fill="#cbd5e1" font-family="Courier New" font-size="20">users: { progress.totalScore: -1, progress.challengesCompleted: -1 }</text>
  <text x="600" y="565" text-anchor="middle" fill="#cbd5e1" font-family="Courier New" font-size="20">challenges: { category: 1, difficulty: 1, isActive: 1 }</text>
  <text x="600" y="600" text-anchor="middle" fill="#cbd5e1" font-family="Courier New" font-size="20">attempts: { userId: 1, challengeId: 1 } unique</text>
</svg>
