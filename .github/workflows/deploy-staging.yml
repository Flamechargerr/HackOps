name: 🚧 Build Staging Artifact

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-staging:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📦 Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🔎 Validate API base URL
        run: test -n "${{ vars.STAGING_VITE_API_BASE_URL }}"


      - name: 🏗️ Build Frontend for Staging
        working-directory: ./frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: ${{ vars.STAGING_VITE_API_BASE_URL }}

      - name: 📤 Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: hackops-frontend-staging-dist
          path: ./frontend/dist
