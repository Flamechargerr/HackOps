name: 🚀 Build and Deploy HackOps

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
          
      - name: 📦 Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🔎 Validate API base URL
        run: test -n "${{ vars.VITE_API_BASE_URL }}"

        
      - name: 🏗️ Build Frontend for Production
        working-directory: ./frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          
      - name: 📋 Copy 404 Page for SPA Routing
        working-directory: ./frontend
        run: cp dist/index.html dist/404.html
        
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          cname: ''
          
      - name: ✅ Deployment Success
        run: |
          echo "🎉 HackOps successfully deployed!"
          echo "🔗 Live URL: https://flamechargerr.github.io/HackOps/"
          echo "🕒 Deployed at: $(date)"